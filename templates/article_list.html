<!-- templates/article_list.html -->
{% extends "base.html" %}

{% block title %}Articles{% endblock title %}

{% block content %}
{% for article in article_list %}
<div class="card">
    <div class="card-header">
        <span class="fw-bold">
            <a href="{{ article.get_absolute_url }}">{{ article.title }}</a> <!--Added link to article -->
        </span> &middot;
        <span class="text-muted">by {{ article.author }} |
          {{ article.date }}</span>
    </div>
    <div class="card-body">
        {{ article.body }}
    </div>
    <div class="card-footer text-center text-muted">
        <a href="{% url 'article_edit' article.pk %}">Edit</a>  <!--Added link to edit article -->
        <a href="{% url 'article_delete' article.pk %}">Delete</a>    <!--Added link to delete article -->
    </div>
</div>
<br />
{% endfor %}
{% endblock content %}
